# À copier dans le dossier `supabase/docker/` (à côté du docker-compose.yml).
# Injecte les secrets Mamélodie dans le service Edge Functions.
# Ajoute les valeurs correspondantes dans le `.env` de la stack Supabase.
#
#   cp deploy/selfhost/docker-compose.override.yml <chemin>/supabase/docker/
#   (puis: docker compose up -d)

services:
  functions:
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APIPASS_API_KEY: ${APIPASS_API_KEY:-}
      # Callback musique (recommandé) : URL publique des Edge Functions +
      # secret partagé. Mono-domaine : FUNCTIONS_PUBLIC_URL=https://mamelodie.net/functions/v1
      FUNCTIONS_PUBLIC_URL: ${FUNCTIONS_PUBLIC_URL:-}
      # Base publique du stockage (pour les liens audio ré-hébergés) :
      #   local : http://localhost:8000   |   prod : https://mamelodie.net
      PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL:-}
      APIPASS_WEBHOOK_SECRET: ${APIPASS_WEBHOOK_SECRET:-}
      # GeniusPay : les clés se saisissent de préférence depuis l'ADMIN (stockage
      # sécurisé app_secrets, sandbox + live). Ces variables restent un repli.
      GENIUSPAY_API_KEY: ${GENIUSPAY_API_KEY:-}
      GENIUSPAY_API_SECRET: ${GENIUSPAY_API_SECRET:-}
