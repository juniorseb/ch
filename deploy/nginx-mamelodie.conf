# /etc/nginx/sites-available/mamelodie  (puis: ln -s vers sites-enabled)
# Sert le build Vite (SPA) de Mamélodie avec fallback des routes côté client.
# HTTPS via Certbot (voir DEPLOIEMENT.md).

server {
    listen 80;
    server_name mamelodie.net www.mamelodie.net;
    # Certbot ajoutera la redirection 443 ; en attendant, sert en HTTP.

    root /var/www/mamelodie/dist;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets fingerprintés (Vite) : cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : toutes les routes inconnues -> index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
